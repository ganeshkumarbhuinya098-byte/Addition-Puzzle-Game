<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addition Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }
        body {
            background-color: #f5f6fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }
        .header {
            width: 100%;
            background-color: #4a90e2;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header .btn {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
        }
        .stats-bar {
            width: 90%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            margin: 20px 0 10px 0;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            padding: 0 5px;
        }
        .game-container {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
            justify-content: center;
            padding-bottom: 50px;
        }
        .question-box {
            background-color: #ffffff;
            width: 100%;
            padding: 35px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            font-size: 36px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 30px;
            border: 1px solid #e1e8ed;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            margin-bottom: 25px;
        }
        .option-btn {
            background-color: #ffffff;
            border: 2px solid #e1e8ed;
            padding: 18px;
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
        }
        .option-btn:active {
            transform: scale(0.95);
        }
        .message {
            font-size: 24px;
            font-weight: bold;
            height: 35px;
            margin-top: 10px;
            text-align: center;
        }
        .correct-msg { color: #2ecc71; }
        .wrong-msg { color: #e74c3c; }
    </style>
</head>
<body>

    <div class="header">
        <button class="btn" onclick="window.history.back()">⬅</button>
        <span>Addition Game</span>
        <button class="btn" onclick="restartGame()">🔄</button>
    </div>

    <div class="stats-bar">
        <div>Level: <span id="level">1</span></div>
        <div>Score: <span id="score">0</span></div>
    </div>

    <div class="game-container">
        <div class="question-box" id="question">0 + 0 = ?</div>
        
        <div class="options-grid">
            <button class="option-btn" onclick="checkAnswer(this)"></button>
            <button class="option-btn" onclick="checkAnswer(this)"></button>
            <button class="option-btn" onclick="checkAnswer(this)"></button>
            <button class="option-btn" onclick="checkAnswer(this)"></button>
        </div>

        <div class="message" id="message"></div>
    </div>

<script>
    let num1, num2, correctAnswer;
    let score = 0;
    let level = 1;

    // Free online audio assets
    const correctSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-84.wav');
    const wrongSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2018/2018-84.wav');

    function generateQuestion() {
        let maxNum = 10 + (level * 5); 
        num1 = Math.floor(Math.random() * maxNum) + 1;
        num2 = Math.floor(Math.random() * maxNum) + 1;
        correctAnswer = num1 + num2;
        
        document.getElementById('question').innerText = `${num1} + ${num2} = ?`;
        document.getElementById('message').innerText = '';
        
        setupOptions();
    }

    function setupOptions() {
        let options = [correctAnswer];
        
        while(options.length < 4) {
            let wrongAns = correctAnswer + Math.floor(Math.random() * 10) - 5;
            if(wrongAns !== correctAnswer && wrongAns > 0 && !options.includes(wrongAns)) {
                options.push(wrongAns);
            }
        }
        
        options.sort(() => Math.random() - 0.5);
        
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach((btn, index) => {
            btn.innerText = options[index];
            btn.style.backgroundColor = "#ffffff";
            btn.style.color = "#2c3e50";
            btn.disabled = false;
        });
    }

    function checkAnswer(selectedButton) {
        const userAnswer = parseInt(selectedButton.innerText);
        const messageElement = document.getElementById('message');
        const buttons = document.querySelectorAll('.option-btn');
        
        buttons.forEach(btn => btn.disabled = true);

        if (userAnswer === correctAnswer) {
            score++;
            document.getElementById('score').innerText = score;
            messageElement.innerText = "Excellent! 🎉";
            messageElement.className = "message correct-msg";
            selectedButton.style.backgroundColor = "#2ecc71";
            selectedButton.style.color = "white";
            
            correctSound.play().catch(e => console.log("Audio blocked"));
            
            if(score % 3 === 0) {
                level++;
                document.getElementById('level').innerText = level;
            }
            
            setTimeout(generateQuestion, 1500);
        } else {
            messageElement.innerText = "Wrong! ❌";
            messageElement.className = "message wrong-msg";
            selectedButton.style.backgroundColor = "#e74c3c";
            selectedButton.style.color = "white";
            
            buttons.forEach(btn => {
                if(parseInt(btn.innerText) === correctAnswer) {
                    btn.style.backgroundColor = "#2ecc71";
                    btn.style.color = "white";
                }
            });

            wrongSound.play().catch(e => console.log("Audio blocked"));
            
            setTimeout(generateQuestion, 2000);
        }
    }

    function restartGame() {
        score = 0;
        level = 1;
        document.getElementById('score').innerText = score;
        document.getElementById('level').innerText = level;
        generateQuestion();
    }

    window.onload = generateQuestion;
</script>

</body>
</html>
