<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Puzzle Arena Pro</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #FFF;
        }

        .game-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Stats Bar */
        .stats-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            background: #1E1E1E;
            padding: 15px;
            border-radius: 16px;
            border: 2px solid #333;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
            font-size: 14px;
        }

        /* Puzzle Box with Dotted Grid */
        .puzzle-box {
            width: 100%;
            background: #1E1E1E;
            border: 3px solid #333;
            border-radius: 24px;
            padding: 40px 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            box-shadow: 0 10px 0 #000;
            background-image: radial-gradient(#444 1.5px, transparent 1.5px);
            background-size: 18px 18px;
        }

        .current-mode-title {
            font-size: 14px;
            font-weight: bold;
            color: #AAA;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #2D2D2D;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .question {
            font-size: 46px;
            font-weight: 800;
            color: #FFF;
            letter-spacing: 2px;
        }

        .question span {
            color: #A855F7;
        }

        .input-box {
            width: 85%;
            height: 65px;
            border: 3px solid #333;
            border-radius: 16px;
            background: #121212;
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: #FFF;
            outline: none;
        }

        .submit-btn {
            width: 85%;
            height: 55px;
            background: #7C3AED;
            color: white;
            border: 2px solid #000;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 0 #000;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .submit-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #000;
        }

        /* Bottom Controls Grid Style */
        .control-btns {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .row-btns {
            width: 100%;
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid #333;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            background: #1E1E1E;
            color: #FFF;
            cursor: pointer;
            box-shadow: 0 4px 0 #000;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
        }

        .action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #000;
        }

        /* Disabled State styling for Old game button */
        .action-btn:disabled {
            opacity: 0.3 !important;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Feedback Overlay Styling */
        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 21px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10; display: none;
        }
        .feedback-overlay.correct { background: #06B6D4; color: white; animation: burst 0.3s forwards; }
        .feedback-overlay.wrong { background: #EF4444; color: white; animation: shake 0.3s ease-in-out; }
        .feedback-icon { font-size: 60px; margin-bottom: 10px; }
        .feedback-text { font-size: 24px; font-weight: 800; }

        /* Modals Menu UI */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; visibility: hidden; opacity: 0; transition: all 0.2s ease;
        }
        .modal.active { visibility: visible; opacity: 1; }

        .modal-content {
            background: #1E1E1E;
            border: 3px solid #333;
            border-radius: 24px;
            padding: 25px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 8px 0 #000;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .menu-btn {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            border: 2px solid #333;
            border-radius: 12px;
            background: #121212;
            color: #FFF;
            cursor: pointer;
            text-align: left;
        }
        .menu-btn.active-mode { background: #7C3AED; border-color: #A855F7; }

        /* Leaderboard Box List */
        .rank-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 10px;
        }
        .rank-item {
            display: flex;
            justify-content: space-between;
            background: #121212;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            border: 1px solid #333;
            align-items: center;
        }
        .rank-number { font-weight: bold; color: #FBBF24; }

        .divider { height: 2px; background: #333; margin: 4px 0; }

        /* Emoji Profile Selector */
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 10px 0;
        }
        .emoji-option {
            font-size: 28px;
            padding: 8px;
            background: #121212;
            border: 2px solid #333;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s ease;
        }
        .emoji-option.selected {
            border-color: #A855F7;
            background: #2D1F3D;
        }

        .name-container {
            background: #1E1E1E;
            padding: 30px 20px;
            border-radius: 24px;
            border: 3px solid #333;
            text-align: center;
            width: 90%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 8px 0 #000;
        }
        
        .alert-error {
            color: #FF4A4A;
            font-size: 14px;
            font-weight: 700;
            display: none;
            background: #2A1616;
            padding: 12px;
            border: 2px solid #FF4A4A;
            border-radius: 12px;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(255, 74, 74, 0.2);
        }

        @keyframes burst { 0% { transform: scale(0.7); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }
    </style>
</head>
<body>

    <div id="name-setup-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:flex; justify-content:center; align-items:center; z-index:200; display:none;">
        <div class="name-container">
            <h2 id="profile-title">🎮 Create Profile</h2>
            <p style="color:#AAA; font-size:14px;">Select an avatar and a unique name.</p>
            
            <div class="emoji-grid" id="emoji-picker-grid">
                <div class="emoji-option selected" data-emoji="🥷">🥷</div>
                <div class="emoji-option" data-emoji="🚀">🚀</div>
                <div class="emoji-option" data-emoji="🦊">🦊</div>
                <div class="emoji-option" data-emoji="🤖">🤖</div>
                <div class="emoji-option" data-emoji="🎮">🎮</div>
                <div class="emoji-option" data-emoji="🦁">🦁</div>
                <div class="emoji-option" data-emoji="👻">👻</div>
                <div class="emoji-option" data-emoji="🐱">🐱</div>
                <div class="emoji-option" data-emoji="🧙">🧙</div>
                <div class="emoji-option" data-emoji="💎">💎</div>
            </div>

            <input type="text" id="username-input" class="input-box" placeholder="Enter Name..." style="width:100%; height: 50px; font-size: 20px;">
            
            <div class="alert-error" id="name-error-msg">⚠️ This name is already taken by a top ranker! Try another name.</div>
            
            <button class="submit-btn" id="save-name-btn" style="width:100%;">Save & Play</button>
            <button class="menu-btn" id="cancel-profile-btn" style="text-align:center; color:#AAA; display:none; background:transparent; border-color:transparent;">Cancel</button>
        </div>
    </div>

    <div class="game-container">
        <div class="stats-bar">
            <div class="stat-item" style="color: #A855F7;">📈 LVL: <span id="level-val">1</span></div>
            <div class="stat-item" style="color: #06B6D4;">🏆 SCR: <span id="score-val">0</span></div>
            <div class="stat-item" style="color: #FBBF24;">⚡ STK: <span id="streak-val">0</span></div>
        </div>

        <div class="puzzle-box">
            <div class="current-mode-title" id="mode-display-tag">Infinite Addition</div>
            <div class="question" id="question-text">0 <span>+</span> 0</div>
            <input type="number" class="input-box" id="answer-input" placeholder="?" inputmode="numeric">
            <button class="submit-btn" id="submit-btn">Submit</button>

            <div class="feedback-overlay" id="feedback-overlay">
                <div class="feedback-icon" id="feedback-icon">✓</div>
                <div class="feedback-text" id="feedback-text">Awesome!</div>
            </div>
        </div>

        <div class="control-btns">
            <button class="action-btn" id="switch-btn" style="width: 100%;">⚙ Switch Mode Menu</button>
            <div class="row-btns">
                <button class="action-btn" id="new-game-btn" style="background: #2D1A1A; border-color: #EF4444;">🔄 New Game</button>
                <button class="action-btn" id="old-game-btn" style="background: #192D1A; border-color: #10B981;" disabled>💾 Old Game</button>
            </div>
        </div>
    </div>

    <div class="modal" id="mode-modal">
        <div class="modal-content">
            <h3 style="text-align:center; color:#FBBF24; margin-bottom:5px;">🎮 GAME MODES</h3>
            <div class="divider"></div>
            
            <button class="menu-btn active-mode" id="mode-add">➕ Infinite Addition</button>
            <button class="menu-btn" id="mode-sub">➖ Sub Penalty</button>
            <button class="menu-btn" id="mode-mul">✖ Multiply Master</button>
            <button class="menu-btn" id="mode-div">➗ Divide Arena</button>
            <button class="menu-btn" id="mode-mix">🔀 Mixed Arena (+, -, ×, ÷)</button>
            
            <div class="divider"></div>
            <button class="menu-btn" id="btn-edit-profile" style="border-color: #A855F7; color: #A855F7; text-align: center; background: #1E1E1E;">✏️ Edit Profile Name/Emoji</button>
            <button class="menu-btn" id="btn-open-leaderboard" style="border-color: #06B6D4; color: #06B6D4; text-align: center; background: #1E1E1E;">🏆 View Leaderboard (Top 100)</button>
            <button class="menu-btn" id="btn-close-mode" style="text-align:center; color:#AAA;">❌ Close</button>
        </div>
    </div>

    <div class="modal" id="leaderboard-modal">
        <div class="modal-content">
            <h3 style="text-align:center; color:#FBBF24;">👑 LEADERBOARD RANKINGS</h3>
            <p style="font-size:12px; text-align:center; color:#AAA;">Your High Streak: <span id="user-high-streak">0</span></p>
            <div class="divider"></div>
            
            <div class="rank-list" id="leaderboard-rank-container"></div>

            <div class="divider"></div>
            <button class="menu-btn" id="btn-close-leaderboard" style="text-align:center; color:#EF4444; background:#121212;">⬅ Back To Modes</button>
        </div>
    </div>

    <script>
        let playerName = "Guest";
        let playerEmoji = "🥷";
        let currentLevel = 1;
        let currentScore = 0;
        let currentStreak = 0;
        let highestStreak = 0;
        let gameMode = 'addition'; 
        let num1 = 0, num2 = 0, currentOperator = '+';
        let isGameStartedAndPlayed = false; // Safe lock checker flag

        const mockNames = ["Rohan Kumar", "Aman Singh", "Vikram Das", "Priya Sharma", "Rajesh Yadav", "Sanjay Pal", "Nitin Verma", "Deepak Jha", "Anjali Neogi", "Rahul Dev"];
        const mockEmojis = ["🚀", "🦊", "🤖", "🎮", "🦁", "👻", "🐱", "🧙", "💎"];

        const levelVal = document.getElementById('level-val');
        const scoreVal = document.getElementById('score-val');
        const streakVal = document.getElementById('streak-val');
        const questionText = document.getElementById('question-text');
        const answerInput = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const newGameBtn = document.getElementById('new-game-btn');
        const oldGameBtn = document.getElementById('old-game-btn');
        const switchBtn = document.getElementById('switch-btn');
        
        const modeModal = document.getElementById('mode-modal');
        const leaderboardModal = document.getElementById('leaderboard-modal');
        const modeDisplayTag = document.getElementById('mode-display-tag');
        const leaderboardRankContainer = document.getElementById('leaderboard-rank-container');
        const userHighStreakText = document.getElementById('user-high-streak');
        const nameErrorMsg = document.getElementById('name-error-msg');
        
        const feedbackOverlay = document.getElementById('feedback-overlay');
        const feedbackIcon = document.getElementById('feedback-icon');
        const feedbackText = document.getElementById('feedback-text');

        const nameSetupScreen = document.getElementById('name-setup-screen');
        const usernameInput = document.getElementById('username-input');
        const saveNameBtn = document.getElementById('save-name-btn');
        const cancelProfileBtn = document.getElementById('cancel-profile-btn');
        const profileTitle = document.getElementById('profile-title');

        document.querySelectorAll('.emoji-option').forEach(item => {
            item.onclick = function() {
                document.querySelectorAll('.emoji-option').forEach(el => el.classList.remove('selected'));
                item.classList.add('selected');
                playerEmoji = item.getAttribute('data-emoji');
            };
        });

        window.onload = function() {
            const savedName = localStorage.getItem('puzzle_player_name');
            highestStreak = parseInt(localStorage.getItem('puzzle_high_streak')) || 0;

            if (!savedName) {
                profileTitle.innerText = "🎮 Create Profile";
                cancelProfileBtn.style.display = 'none';
                nameSetupScreen.style.display = 'flex';
            } else {
                playerName = savedName;
                playerEmoji = localStorage.getItem('puzzle_player_emoji') || "🥷";
                checkOldGameButtonStatus();
                setupCleanBoardNoSave();
            }
        };

        function checkOldGameButtonStatus() {
            if(localStorage.getItem('puzzle_saved_game') === 'true') {
                oldGameBtn.disabled = false;
            } else {
                oldGameBtn.disabled = true;
            }
        }

        document.getElementById('btn-edit-profile').onclick = function() {
            modeModal.classList.remove('active');
            profileTitle.innerText = "✏️ Edit Profile";
            usernameInput.value = playerName;
            document.querySelectorAll('.emoji-option').forEach(el => {
                if(el.getAttribute('data-emoji') === playerEmoji) el.classList.add('selected');
                else el.classList.remove('selected');
            });
            nameErrorMsg.style.display = 'none';
            cancelProfileBtn.style.display = 'block';
            nameSetupScreen.style.display = 'flex';
        };

        cancelProfileBtn.onclick = () => nameSetupScreen.style.display = 'none';

        saveNameBtn.onclick = function() {
            const typedName = usernameInput.value.trim();
            if(typedName === "") return;

            const nameExists = mockNames.some(name => name.toLowerCase() === typedName.toLowerCase());
            if (nameExists) {
                nameErrorMsg.style.display = 'block';
                return;
            }

            nameErrorMsg.style.display = 'none';
            playerName = typedName;
            localStorage.setItem('puzzle_player_name', playerName);
            localStorage.setItem('puzzle_player_emoji', playerEmoji);
            nameSetupScreen.style.display = 'none';
            
            setupCleanBoardNoSave();
        };

        // Old Game click trigger logic
        oldGameBtn.onclick = function() {
            if(localStorage.getItem('puzzle_saved_game') === 'true') {
                currentLevel = parseInt(localStorage.getItem('puzzle_lvl')) || 1;
                currentScore = parseInt(localStorage.getItem('puzzle_scr')) || 0;
                currentStreak = parseInt(localStorage.getItem('puzzle_stk')) || 0;
                gameMode = localStorage.getItem('puzzle_mode') || 'addition';
                isGameStartedAndPlayed = true;
                
                setActiveModeVisual(gameMode);
                updateUI();
                generateQuestion();
            }
        };

        function generateQuestion() {
            if (gameMode === 'addition') currentOperator = '+';
            else if (gameMode === 'subtraction') currentOperator = '-';
            else if (gameMode === 'multiplication') currentOperator = '×';
            else if (gameMode === 'division') currentOperator = '➗';
            else {
                const ops = ['+', '-', '×', '➗'];
                currentOperator = ops[Math.floor(Math.random() * ops.length)];
            }

            if (currentOperator === '+' || currentOperator === '-') {
                if (currentLevel === 1) {
                    num1 = Math.floor(Math.random() * 10) + 3; 
                    num2 = Math.floor(Math.random() * 10) + 2; 
                } else if (currentLevel === 2) {
                    num1 = Math.floor(Math.random() * 15) + 10;
                    num2 = Math.floor(Math.random() * 15) + 5;
                } else {
                    let rangeMax = 20 + (currentLevel * 10);
                    if (rangeMax > 200) rangeMax = 200;
                    num1 = Math.floor(Math.random() * rangeMax) + 10;
                    num2 = Math.floor(Math.random() * rangeMax) + 10;
                }
                if (currentOperator === '-' && num1 < num2) {
                    let temp = num1; num1 = num2; num2 = temp;
                }
            } 
            else if (currentOperator === '×') {
                if (currentLevel <= 2) {
                    num1 = Math.floor(Math.random() * 7) + 2; 
                    num2 = Math.floor(Math.random() * 4) + 2; 
                } else {
                    num1 = Math.floor(Math.random() * 5) + 8; 
                    num2 = Math.floor(Math.random() * 8) + 2; 
                }
            } 
            else if (currentOperator === '➗') {
                if (currentLevel <= 2) {
                    let divisor = Math.floor(Math.random() * 5) + 2; 
                    let quotient = Math.floor(Math.random() * 5) + 2; 
                    num1 = divisor * quotient; 
                    num2 = divisor;
                } else {
                    let divisor = Math.floor(Math.random() * 7) + 3; 
                    let quotient = Math.floor(Math.random() * 8) + 3; 
                    num1 = divisor * quotient;
                    num2 = divisor;
                }
            }

            questionText.innerHTML = `${num1} <span>${currentOperator}</span> ${num2}`;
            answerInput.value = '';
            answerInput.focus();
        }

        function checkAnswer() {
            const playerAns = parseInt(answerInput.value);
            if (isNaN(playerAns)) return;

            // Safe lock opens because user plays an active turn right now
            isGameStartedAndPlayed = true;

            let correctAns;
            if (currentOperator === '+') correctAns = num1 + num2;
            else if (currentOperator === '-') correctAns = num1 - num2;
            else if (currentOperator === '×') correctAns = num1 * num2;
            else if (currentOperator === '➗') correctAns = num1 / num2;

            if (playerAns === correctAns) {
                currentScore += 1;
                currentStreak += 1;
                if (currentScore % 4 === 0) currentLevel += 1;

                if (currentStreak > highestStreak) {
                    highestStreak = currentStreak;
                    localStorage.setItem('puzzle_high_streak', highestStreak);
                }
                showFeedback(true);
            } else {
                currentStreak = 0; 
                showFeedback(false);
            }
            
            // Only saves to device memory when turn actually completes
            updateUIAndStorage();
        }

        function updateUIAndStorage() {
            updateUI();
            if(isGameStartedAndPlayed) {
                localStorage.setItem('puzzle_saved_game', 'true');
                localStorage.setItem('puzzle_lvl', currentLevel);
                localStorage.setItem('puzzle_scr', currentScore);
                localStorage.setItem('puzzle_stk', currentStreak);
                localStorage.setItem('puzzle_mode', gameMode);
                checkOldGameButtonStatus();
            }
        }

        function updateUI() {
            levelVal.innerText = currentLevel;
            scoreVal.innerText = currentScore;
            streakVal.innerText = currentStreak;
        }

        function showFeedback(isCorrect) {
            feedbackOverlay.className = 'feedback-overlay ' + (isCorrect ? 'correct' : 'wrong');
            feedbackIcon.innerText = isCorrect ? '✓' : '✗';
            feedbackText.innerText = isCorrect ? 'Awesome!' : 'Wrong! Try Again';
            feedbackOverlay.style.display = 'flex';

            setTimeout(() => {
                feedbackOverlay.style.display = 'none';
                if(isCorrect) generateQuestion(); 
                else { answerInput.value = ''; answerInput.focus(); }
            }, 900);
        }

        // New Game Reset Board view layout without instantly modifying database records
        function setupCleanBoardNoSave() {
            currentLevel = 1;
            currentScore = 0;
            currentStreak = 0;
            isGameStartedAndPlayed = false; // Lock stays safe until turn plays
            updateUI();
            checkOldGameButtonStatus();
            generateQuestion();
        }

        function selectMode(mode) {
            gameMode = mode;
            setActiveModeVisual(mode);
            // Mode changes cleanly on active board layout
            if(isGameStartedAndPlayed) {
                updateUIAndStorage();
            } else {
                updateUI();
            }
            generateQuestion();
            modeModal.classList.remove('active');
        }

        function setActiveModeVisual(mode) {
            const modeIds = { 'addition': 'mode-add', 'subtraction': 'mode-sub', 'multiplication': 'mode-mul', 'division': 'mode-div', 'mixed': 'mode-mix' };
            document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active-mode'));
            const activeBtn = document.getElementById(modeIds[mode]);
            if(activeBtn) {
                activeBtn.classList.add('active-mode');
                modeDisplayTag.innerText = activeBtn.innerText.replace(/^[^\s]+\s*/, '');
            }
        }

        function buildLeaderboardUI() {
            userHighStreakText.innerText = highestStreak;
            leaderboardRankContainer.innerHTML = "";

            let htmlStr = `<div class="rank-item" style="border-color:#FBBF24; background:#2D2114;">
                <span class="rank-number">🥇 Rank 1</span>
                <span>${playerEmoji} <b>${playerName} (You)</b></span>
                <span style="color:#FBBF24;">⚡ ${highestStreak} Streak</span>
            </div>`;

            let baseScore = Math.max(highestStreak + 10, 20);

            for (let i = 2; i <= 100; i++) {
                let currentRankName = mockNames[(i % mockNames.length)];
                let currentRankEmoji = mockEmojis[(i % mockEmojis.length)];
                baseScore = baseScore - (Math.floor(Math.random() * 2) === 0 ? 1 : 0);
                if(baseScore < 0) baseScore = 0;

                let medal = `Rank ${i}`;
                if(i === 2) medal = "🥈 Rank 2";
                if(i === 3) medal = "🥉 Rank 3";

                htmlStr += `<div class="rank-item">
                    <span class="rank-number">${medal}</span>
                    <span>${currentRankEmoji} ${currentRankName}</span>
                    <span style="color:#AAA;">⚡ ${baseScore} Streak</span>
                </div>`;
            }
            leaderboardRankContainer.innerHTML = htmlStr;
        }

        document.getElementById('mode-add').onclick = () => selectMode('addition');
        document.getElementById('mode-sub').onclick = () => selectMode('subtraction');
        document.getElementById('mode-mul').onclick = () => selectMode('multiplication');
        document.getElementById('mode-div').onclick = () => selectMode('division');
        document.getElementById('mode-mix').onclick = () => selectMode('mixed');

        submitBtn.onclick = checkAnswer;
        answerInput.onkeydown = (e) => { if (e.key === 'Enter') checkAnswer(); };
        switchBtn.onclick = () => modeModal.classList.add('active');
        
        document.getElementById('btn-close-mode').onclick = () => modeModal.classList.remove('active');
        document.getElementById('btn-open-leaderboard').onclick = () => {
            buildLeaderboardUI();
            modeModal.classList.remove('active');
            leaderboardModal.classList.add('active');
        };
        document.getElementById('btn-close-leaderboard').onclick = () => {
            leaderboardModal.classList.remove('active');
            modeModal.classList.add('active');
        };
        
        newGameBtn.onclick = setupCleanBoardNoSave;
    </script>
</body>
</html>
