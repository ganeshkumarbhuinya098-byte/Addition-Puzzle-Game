<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Arena - Pure English Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            background-color: #fff9e6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        .screen-wrapper {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .stats-bar {
            background: #ffffff;
            width: 100%;
            padding: 12px 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 6px 0px rgba(0, 0, 0, 0.05);
            border: 2px solid #11142a;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .icon-purple { background: #f3e8ff; color: #7c3aed; }
        .icon-green { background: #dcfce7; color: #16a34a; }
        .icon-orange { background: #ffedd5; color: #ea580c; }

        .stat-text { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; font-weight: 800; color: #6b7280; }
        .stat-value { font-size: 1.1rem; font-weight: 900; color: #11142a; }

        .card-container {
            width: 100%;
            height: 380px;
            position: relative;
        }

        .game-card {
            background-color: #ffffff;
            background-image: radial-gradient(#e5e7eb 1.5px, transparent 1.5px), radial-gradient(#e5e7eb 1.5px, #ffffff 1.5px);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            width: 100%;
            height: 100%;
            border-radius: 32px;
            border: 4px solid #11142a;
            box-shadow: 0 10px 0px #11142a;
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
        }

        .game-card.correct-state {
            background: #1db97e !important;
            background-image: none !important;
        }

        .game-card.wrong-state {
            background: #e65353 !important;
            background-image: none !important;
        }

        .flash-content {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            gap: 20px;
        }

        .flash-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 8px solid #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: bold;
            color: #ffffff;
        }

        .flash-text {
            font-size: 2.2rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .question-text {
            font-size: 4rem;
            font-weight: 900;
            color: #11142a;
            margin-top: 10px;
        }

        .input-box-wrapper { width: 100%; max-width: 280px; }

        #answer-input {
            width: 100%;
            padding: 14px;
            font-size: 2rem;
            background: #ffffff;
            border: 3px solid #11142a;
            color: #11142a;
            border-radius: 18px;
            text-align: center;
            outline: none;
            font-weight: 900;
        }

        .submit-btn {
            background: #7c3aed;
            color: #ffffff;
            border: 3px solid #11142a;
            padding: 14px;
            font-size: 1.3rem;
            font-weight: 900;
            border-radius: 18px;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
            box-shadow: 0 6px 0px #11142a;
            transition: 0.1s;
        }

        .submit-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #11142a;
        }

        .settings-trigger-btn {
            background: #ffffff;
            color: #11142a;
            border: 2px solid #11142a;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: 800;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 0px #11142a;
        }

        .settings-modal {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: #1a1d29;
            border-top: 4px solid #00f2fe;
            border-radius: 24px 24px 0 0;
            padding: 25px;
            z-index: 10;
            transition: bottom 0.2s ease;
        }

        .settings-modal.active { bottom: 0; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; color: white; }
        .close-modal-icon { font-size: 1.5rem; cursor: pointer; }
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; color: white; }
        
        .modes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .mode-select-btn { background: #242838; color: white; border: 2px solid #33394f; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .mode-select-btn.active-mode { background: #7c3aed; border-color: #11142a; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 9; }
        .hidden { display: none !important; }
        .flex { display: flex !important; }
    </style>
</head>
<body>

    <div class="screen-wrapper">
        <div class="stats-bar">
            <div class="stat-item"><div class="stat-icon icon-purple">📈</div><div class="stat-text"><span class="stat-label">Level</span><span id="level-val" class="stat-value">1</span></div></div>
            <div class="stat-item"><div class="stat-icon icon-green">🏆</div><div class="stat-text"><span class="stat-label">Score</span><span id="score-val" class="stat-value">0</span></div></div>
            <div class="stat-item"><div class="stat-icon icon-orange">⚡</div><div class="stat-text"><span class="stat-label">Streak</span><span id="streak-val" class="stat-value">0</span></div></div>
        </div>

        <div class="card-container">
            <div class="game-card" id="interactive-card">
                
                <div class="flash-content flex" id="main-play-content">
                    <div class="question-text" id="display-question">0 + 0</div>
                    <div class="input-box-wrapper">
                        <input type="number" id="answer-input" placeholder="?" inputmode="numeric">
                    </div>
                    <button class="submit-btn" id="submit-answer-btn">Submit</button>
                </div>

                <div class="flash-content" id="correct-flash-content">
                    <div class="flash-icon">✓</div>
                    <div class="flash-text">Awesome!</div>
                </div>

                <div class="flash-content" id="wrong-flash-content">
                    <div class="flash-icon">✕</div>
                    <div class="flash-text">Try Again!</div>
                </div>

            </div>
        </div>

        <button class="settings-trigger-btn" id="open-settings-btn">Settings ⚙️</button>
    </div>

    <div class="modal-overlay" id="ui-overlay"></div>
    <div class="settings-modal" id="settings-drawer">
        <div class="modal-header"><h3>Game Controls</h3><span class="close-modal-icon" id="close-settings-btn">&times;</span></div>
        <div class="toggle-row"><span>Sound Effects</span><input type="checkbox" id="sound-toggle" checked></div>
        <div class="toggle-row"><span>Vibration</span><input type="checkbox" id="vibrate-toggle" checked></div>
        <div class="modes-grid">
            <button class="mode-select-btn active-mode" data-mode="addition">Addition (+)</button>
            <button class="mode-select-btn" data-mode="subtraction">Subtraction (-)</button>
            <button class="mode-select-btn" data-mode="multiplication">Multiplication (×)</button>
            <button class="mode-select-btn" data-mode="division">Division (÷)</button>
        </div>
    </div>

    <script>
        const openSettingsBtn = document.getElementById('open-settings-btn');
        const closeSettingsBtn = document.getElementById('close-settings-btn');
        const settingsDrawer = document.getElementById('settings-drawer');
        const uiOverlay = document.getElementById('ui-overlay');
        const interactiveCard = document.getElementById('interactive-card');
        const mainPlayContent = document.getElementById('main-play-content');
        const correctFlashContent = document.getElementById('correct-flash-content');
        const wrongFlashContent = document.getElementById('wrong-flash-content');
        const displayQuestion = document.getElementById('display-question');
        const answerInput = document.getElementById('answer-input');
        const submitAnswerBtn = document.getElementById('submit-answer-btn');
        
        let currentMode = 'addition', score = 0, streak = 0, level = 1, num1 = 0, num2 = 0, correctAnswer = 0;

        openSettingsBtn.addEventListener('click', () => { settingsDrawer.classList.add('active'); uiOverlay.style.display = 'block'; });
        function closeDrawerMenu() { settingsDrawer.classList.remove('active'); uiOverlay.style.display = 'none'; }
        closeSettingsBtn.addEventListener('click', closeDrawerMenu);

        document.querySelectorAll('.mode-select-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.mode-select-btn').forEach(b => b.classList.remove('active-mode'));
                e.target.classList.add('active-mode');
                currentMode = e.target.getAttribute('data-mode');
                closeDrawerMenu();
                generateQuestion();
            });
        });

        function generateQuestion() {
            answerInput.value = ''; answerInput.focus();
            num1 = Math.floor(Math.random() * 10) + 2;
            num2 = Math.floor(Math.random() * 10) + 1;
            if (currentMode === 'addition') { correctAnswer = num1 + num2; displayQuestion.innerText = num1 + " + " + num2; }
            else if (currentMode === 'subtraction') { if (num1 < num2) [num1, num2] = [num2, num1]; correctAnswer = num1 - num2; displayQuestion.innerText = num1 + " - " + num2; }
            else if (currentMode === 'multiplication') { correctAnswer = num1 * num2; displayQuestion.innerText = num1 + " × " + num2; }
            else if (currentMode === 'division') { num1 = num2 * (Math.floor(Math.random() * 5) + 1); correctAnswer = num1 / num2; displayQuestion.innerText = num1 + " ÷ " + num2; }
        }

        function runEvaluationCheck() {
            const playerInput = parseInt(answerInput.value);
            if (isNaN(playerInput)) return;

            if (playerInput === correctAnswer) {
                score += 1; // Fixed: Now increases by 1 instead of 10
                streak += 1; if (streak % 3 === 0) level += 1;
                document.getElementById('score-val').innerText = score;
                document.getElementById('streak-val').innerText = streak;
                document.getElementById('level-val').innerText = level;

                mainPlayContent.classList.remove('flex');
                correctFlashContent.classList.add('flex');
                interactiveCard.classList.add('correct-state');

                setTimeout(() => {
                    interactiveCard.classList.remove('correct-state');
                    correctFlashContent.classList.remove('flex');
                    mainPlayContent.classList.add('flex');
                    generateQuestion();
                }, 1000);
            } else {
                streak = 0; document.getElementById('streak-val').innerText = streak;
                mainPlayContent.classList.remove('flex');
                wrongFlashContent.classList.add('flex');
                interactiveCard.classList.add('wrong-state');

                setTimeout(() => {
                    interactiveCard.classList.remove('wrong-state');
                    wrongFlashContent.classList.remove('flex');
                    mainPlayContent.classList.add('flex');
                    generateQuestion();
                }, 1200);
            }
        }

        submitAnswerBtn.addEventListener('click', runEvaluationCheck);
        answerInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') runEvaluationCheck(); });
        generateQuestion();
    </script>
</body>
</html>
