<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Game</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #6a0dad;
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

h1 {
    margin-top: 10px;
}

.stats {
    margin: 10px 0;
    font-size: 18px;
}

.question {
    font-size: 28px;
    margin: 20px 0;
}

input {
    padding: 10px;
    font-size: 18px;
    width: 120px;
    text-align: center;
    border: none;
    border-radius: 8px;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.correct {
    background: #28a745;
}

.wrong {
    background: #dc3545;
}
</style>
</head>

<body>

<div class="container">
    <h1>Math Game</h1>

    <div class="stats">
        Score: <span id="score">0</span> |
        Level: <span id="level">1</span> |
        Streak: <span id="streak">0</span>
    </div>

    <div class="question" id="question">1 + 1</div>

    <input type="number" id="answer" placeholder="Answer">
    <br>
    <button onclick="checkAnswer()">Submit</button>

    <br><br>
    <button onclick="restartGame()">Restart</button>
</div>

<script>
let num1, num2;
let score = 0;
let level = 1;
let streak = 0;

function getRange() {
    if (level <= 5) return 10;
    if (level <= 10) return 50;
    if (level <= 20) return 100;
    return 500;
}

function generateQuestion() {
    let range = getRange();
    num1 = Math.floor(Math.random() * range);
    num2 = Math.floor(Math.random() * range);
    document.getElementById("question").innerText = num1 + " + " + num2;
}

function checkAnswer() {
    let userAnswer = document.getElementById("answer").value;

    if (userAnswer === "") {
        alert("Answer डालो भाई 😅");
        return;
    }

    userAnswer = parseInt(userAnswer);

    if (userAnswer === num1 + num2) {
        score += 10;
        streak++;
        if (streak % 5 === 0) level++;
        document.body.style.background = "#28a745";
    } else {
        document.body.style.background = "#dc3545";
        setTimeout(() => {
            alert("Game Over ❌");
            restartGame();
        }, 200);
        return;
    }

    updateUI();
    document.getElementById("answer").value = "";
    generateQuestion();

    setTimeout(() => {
        document.body.style.background = "#6a0dad";
    }, 200);
}

function updateUI() {
    document.getElementById("score").innerText = score;
    document.getElementById("level").innerText = level;
    document.getElementById("streak").innerText = streak;
}

function restartGame() {
    score = 0;
    level = 1;
    streak = 0;
    updateUI();
    generateQuestion();
    document.body.style.background = "#6a0dad";
}

generateQuestion();
</script>

</body>
</html>
