<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addition Puzzle Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #F9F9F6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .game-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* Top Stats Bar */
        .stats-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            background: #FFF;
            padding: 12px 15px;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid #EAEAEA;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
            font-size: 14px;
        }

        /* Top Leaderboard Streak Display */
        .top-streak-banner {
            font-size: 13px;
            color: #666;
            font-weight: 600;
            background: #EAEAEA;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: -5px;
        }

        /* Main Puzzle Box (Video Style) */
        .puzzle-box {
            width: 100%;
            background: #FFF;
            border: 3px solid #111;
            border-radius: 24px;
            padding: 30px 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            box-shadow: 0 8px 0 #111;
            background-image: radial-gradient(#E0E0E0 1.5px, transparent 1.5px);
            background-size: 15px 15px;
        }

        .question {
            font-size: 42px;
            font-weight: 800;
            color: #111;
            letter-spacing: 2px;
        }

        .question span {
            color: #4A3AFF;
        }

        .input-box {
            width: 85%;
            height: 65px;
            border: 3px solid #111;
            border-radius: 16px;
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: #111;
            outline: none;
            transition: all 0.2s;
        }

        .input-box::placeholder {
            color: #AAA;
        }

        .submit-btn {
            width: 85%;
            height: 55px;
            background: #7F56D9;
            color: white;
            border: 3px solid #111;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 0 #111;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .submit-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #111;
        }

        /* Bottom Controls */
        .control-btns {
            width: 100%;
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #111;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            background: #FFF;
            cursor: pointer;
            box-shadow: 0 3px 0 #111;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .action-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #111;
        }

        /* Feedback Overlay (Burst Animation) */
        .feedback-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 21px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            display: none;
        }

        .feedback-overlay.correct {
            background: #2EC4B6;
            color: white;
            animation: burst 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .feedback-overlay.wrong {
            background: #FF3366;
            color: white;
            animation: shake 0.3s ease-in-out;
        }

        .feedback-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .feedback-text {
            font-size: 24px;
            font-weight: 800;
        }

        /* Switch Mode Modal (Pop-up Menus) */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s ease;
        }

        .modal.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: white;
            border: 3px solid #111;
            border-radius: 24px;
            padding: 25px;
            width: 90%;
            max-width: 340px;
            box-shadow: 0 8px 0 #111;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 5px;
        }

        .menu-btn {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: 700;
            border: 2px solid #111;
            border-radius: 12px;
            background: #FFF;
            cursor: pointer;
            text-align: left;
        }

        .menu-btn.active-mode {
            background: #E6E2FF;
            border-color: #4A3AFF;
        }

        .menu-btn:hover {
            background: #F5F5F5;
        }

        .menu-btn.active-mode:hover {
            background: #E6E2FF;
        }

        .divider {
            height: 2px;
            background: #EAEAEA;
            margin: 5px 0;
        }

        /* Animations */
        @keyframes burst {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="stats-bar">
            <div class="stat-item" style="color: #4A3AFF;">📈 LEVEL: <span id="level-val">1</span></div>
            <div class="stat-item" style="color: #2EC4B6;">🏆 SCORE: <span id="score-val">0</span></div>
            <div class="stat-item" style="color: #FF9F1C;">⚡ STREAK: <span id="streak-val">0</span></div>
        </div>

        <div class="top-streak-banner">👑 High Streak Record: <span id="high-streak-val">0</span></div>

        <div class="puzzle-box">
            <div class="question" id="question-text">6 <span>+</span> 5</div>
            <input type="number" class="input-box" id="answer-input" placeholder="?" inputmode="numeric">
            <button class="submit-btn" id="submit-btn">Submit</button>

            <div class="feedback-overlay" id="feedback-overlay">
                <div class="feedback-icon" id="feedback-icon">✓</div>
                <div class="feedback-text" id="feedback-text">Awesome!</div>
            </div>
        </div>

        <div class="control-btns">
            <button class="action-btn" id="switch-btn">⚙ Switch Mode</button>
            <button class="action-btn" id="new-game-btn" style="background: #FFF5F5;">🔄 New Game</button>
        </div>
    </div>

    <div class="modal" id="mode-modal">
        <div class="modal-content">
            <div class="modal-title">Select Options</div>
            
            <button class="menu-btn active-mode" id="mode-add-btn">🔢 Infinite Addition</button>
            <button class="menu-btn" id="mode-mix-btn">🔀 Mixed Arena (+ , - , *)</button>
            
            <div class="divider"></div>

            <button class="menu-btn" id="btn-continue" style="border-color: #2EC4B6; color: #2EC4B6;">💾 Continue (Old Game)</button>
            <button class="menu-btn" id="btn-fresh" style="border-color: #FF3366; color: #FF3366;">✨ Start Fresh (New Game)</button>
        </div>
    </div>

    <script>
        // State variables
        let currentLevel = 1;
        let currentScore = 0;
        let currentStreak = 0;
        let highestStreak = 0;
        let gameMode = 'addition'; // 'addition' or 'mixed'
        let stepCount = 1; // For 3-step stair pattern (1=Easy, 2=Medium, 3=Hard)
        let num1 = 0, num2 = 0, currentOperator = '+';

        // Elements
        const levelVal = document.getElementById('level-val');
        const scoreVal = document.getElementById('score-val');
        const streakVal = document.getElementById('streak-val');
        const highStreakVal = document.getElementById('high-streak-val');
        const questionText = document.getElementById('question-text');
        const answerInput = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const newGameBtn = document.getElementById('new-game-btn');
        const switchBtn = document.getElementById('switch-btn');
        const modeModal = document.getElementById('mode-modal');
        const feedbackOverlay = document.getElementById('feedback-overlay');
        const feedbackIcon = document.getElementById('feedback-icon');
        const feedbackText = document.getElementById('feedback-text');

        // Modal Option Buttons
        const modeAddBtn = document.getElementById('mode-add-btn');
        const modeMixBtn = document.getElementById('mode-mix-btn');
        const btnContinue = document.getElementById('btn-continue');
        const btnFresh = document.getElementById('btn-fresh');

        // Init Game on load safely
        window.onload = function() {
            // Load high streak record from localStorage
            highestStreak = parseInt(localStorage.getItem('puzzle_high_streak')) || 0;
            highStreakVal.innerText = highestStreak;

            // Load last active game automatically if exists
            if(localStorage.getItem('puzzle_saved_game') === 'true') {
                loadOldGame();
            } else {
                generateQuestion();
            }
        };

        // 3-Step Pattern Question Generator
        function generateQuestion() {
            // Determine operator based on mode
            if (gameMode === 'addition') {
                currentOperator = '+';
            } else {
                const ops = ['+', '-', '*'];
                currentOperator = ops[Math.floor(Math.random() * ops.length)];
            }

            // Generate numbers according to stepCount (Stair Pattern)
            if (stepCount === 1) {
                // Easy Step
                num1 = Math.floor(Math.random() * 10) + 2;
                num2 = Math.floor(Math.random() * 10) + 2;
            } else if (stepCount === 2) {
                // Medium Step
                num1 = Math.floor(Math.random() * 40) + 11;
                num2 = Math.floor(Math.random() * 40) + 11;
            } else {
                // Hard Step (Dynamic scaling with levels up to 332+456 style)
                let maxRange = 50 + (currentLevel * 50);
                if (maxRange > 800) maxRange = 800; 
                num1 = Math.floor(Math.random() * maxRange) + 50;
                num2 = Math.floor(Math.random() * maxRange) + 50;
            }

            // UI Render
            questionText.innerHTML = `${num1} <span>${currentOperator}</span> ${num2}`;
            answerInput.value = '';
            answerInput.focus();
        }

        // Answer Submission Check
        function checkAnswer() {
            const playerAns = parseInt(answerInput.value);
            if (isNaN(playerAns)) return;

            let correctAns;
            if (currentOperator === '+') correctAns = num1 + num2;
            else if (currentOperator === '-') correctAns = num1 - num2;
            else if (currentOperator === '*') correctAns = num1 * num2;

            if (playerAns === correctAns) {
                // Correct Flow
                currentScore += 1;
                currentStreak += 1;
                
                // Advance Level smoothly every 3 correct answers
                if (currentScore % 3 === 0) {
                    currentLevel += 1;
                }

                // Manage Leaderboard High Streak (Only Streak dictates top position)
                if (currentStreak > highestStreak) {
                    highestStreak = currentStreak;
                    localStorage.setItem('puzzle_high_streak', highestStreak);
                    highStreakVal.innerText = highestStreak;
                }

                // Advance the stair difficulty loop (1 -> 2 -> 3 -> 1)
                stepCount = stepCount < 3 ? stepCount + 1 : 1;

                showFeedback(true);
            } else {
                // Wrong Flow
                currentStreak = 0; // Streak breaks instantly
                showFeedback(false);
            }

            updateUIAndStorage();
        }

        // Update Text and localStorage
        function updateUIAndStorage() {
            levelVal.innerText = currentLevel;
            scoreVal.innerText = currentScore;
            streakVal.innerText = currentStreak;

            // Save running game state securely
            localStorage.setItem('puzzle_saved_game', 'true');
            localStorage.setItem('puzzle_lvl', currentLevel);
            localStorage.setItem('puzzle_scr', currentScore);
            localStorage.setItem('puzzle_stk', currentStreak);
            localStorage.setItem('puzzle_mode', gameMode);
            localStorage.setItem('puzzle_step', stepCount);
        }

        // Burst feedback overlays
        function showFeedback(isCorrect) {
            feedbackOverlay.className = 'feedback-overlay ' + (isCorrect ? 'correct' : 'wrong');
            feedbackIcon.innerText = isCorrect ? '✓' : '✗';
            feedbackText.innerText = isCorrect ? 'Awesome!' : 'Wrong!';
            feedbackOverlay.style.display = 'flex';

            setTimeout(() => {
                feedbackOverlay.style.display = 'none';
                generateQuestion();
            }, 1000);
        }

        // Game Initialization Options
        function startFreshNewGame() {
            currentLevel = 1;
            currentScore = 0;
            currentStreak = 0;
            stepCount = 1;
            updateUIAndStorage();
            generateQuestion();
        }

        function loadOldGame() {
            currentLevel = parseInt(localStorage.getItem('puzzle_lvl')) || 1;
            currentScore = parseInt(localStorage.getItem('puzzle_scr')) || 0;
            currentStreak = parseInt(localStorage.getItem('puzzle_stk')) || 0;
            gameMode = localStorage.getItem('puzzle_mode') || 'addition';
            stepCount = parseInt(localStorage.getItem('puzzle_step')) || 1;

            if(gameMode === 'mixed') {
                modeMixBtn.classList.add('active-mode');
                modeAddBtn.classList.remove('active-mode');
            } else {
                modeAddBtn.classList.add('active-mode');
                modeMixBtn.classList.remove('active-mode');
            }

            updateUIAndStorage();
            generateQuestion();
        }

        // Event Listeners
        submitBtn.onclick = checkAnswer;
        answerInput.onkeydown = (e) => { if (e.key === 'Enter') checkAnswer(); };

        newGameBtn.onclick = function() {
            if(confirm("क्या आप सच में नया गेम शुरू करके वर्तमान स्कोर को 0 करना चाहते हैं?")) {
                startFreshNewGame();
            }
        };

        // Modal Controls
        switchBtn.onclick = () => modeModal.classList.add('active');
        
        // Hide modal when clicked outside content
        modeModal.onclick = (e) => { if(e.target === modeModal) modeModal.classList.remove('active'); };

        modeAddBtn.onclick = function() {
            gameMode = 'addition';
            modeAddBtn.classList.add('active-mode');
            modeMixBtn.classList.remove('active-mode');
            generateQuestion();
            updateUIAndStorage();
            modeModal.classList.remove('active');
        };

        modeMixBtn.onclick = function() {
            gameMode = 'mixed';
            modeMixBtn.classList.add('active-mode');
            modeAddBtn.classList.remove('active-mode');
            generateQuestion();
            updateUIAndStorage();
            modeModal.classList.remove('active');
        };

        btnContinue.onclick = function() {
            loadOldGame();
            modeModal.classList.remove('active');
        };

        btnFresh.onclick = function() {
            startFreshNewGame();
            modeModal.classList.remove('active');
        };
    </script>
</body>
</html>
