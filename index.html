<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Arena - Gaming Edition</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #151922;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #232936;
            width: 90%;
            max-width: 420px;
            text-align: center;
            position: relative;
        }

        /* Hidden Utility Class */
        .hidden {
            display: none !important;
        }

        /* Volume Settings Corner */
        .settings-corner {
            position: absolute;
            top: 12px;
            right: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #volume-slider {
            width: 50px;
            accent-color: #3b82f6;
            cursor: pointer;
        }

        /* Header and Stats styling */
        .header h1 {
            color: #3b82f6;
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .stats-box {
            background: #0d1117;
            border: 1px solid #1f242c;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: left;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: #8b949e;
        }

        .stat-row:last-child {
            margin-bottom: 0;
        }

        .stat-val {
            color: #3b82f6;
            font-weight: bold;
        }

        /* Buttons Styling with original colors */
        .mode-selection {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mode-btn {
            color: #fff;
            border: none;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .solo { background-color: #1d4ed8; } 
        .mind-test { background-color: #6b21a8; } 
        .arena { background-color: #991b1b; } 
        .live-match { background-color: #854d0e; } 
        .leaderboard { background-color: #1f2937; color: #9ca3af; } 

        .mode-btn:hover {
            opacity: 0.9;
            transform: scale(1.01);
        }

        /* New Addition Session Card Styling */
        .session-icon {
            font-size: 3.5rem;
            color: #3b82f6;
            margin-bottom: 10px;
        }

        .session-card h2 {
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .session-subtitle {
            color: #8b949e;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .session-desc {
            font-size: 0.95rem;
            color: #c9d1d9;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .start-btn {
            background: #3b82f6;
            color: #fff;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }

        .start-btn:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>

    <div id="dashboard" class="container">
        <div class="settings-corner">
            <span class="vol-icon">🔊</span>
            <input type="range" id="volume-slider" min="0" max="100" value="50">
        </div>

        <div class="header">
            <h1>GANESH KUMAR'S <br><span>DASHBOARD</span></h1>
            
            <div class="stats-box">
                <div class="stat-row"><span>Level:</span> <span class="stat-val">1</span></div>
                <div class="stat-row"><span>Total Points:</span> <span class="stat-val">0</span></div>
                <div class="stat-row"><span>Wins (1v1):</span> <span class="stat-val">0</span></div>
                <div class="stat-row"><span>Streak 🔥:</span> <span class="stat-val">0</span></div>
            </div>
        </div>

        <div class="mode-selection">
            <button class="mode-btn solo" id="solo-badges-btn">Solo Badges (+, -, ×, ÷)</button>
            <button class="mode-btn mind-test" id="mind-test-btn">Mind Test (Mixed Mode)</button>
            <button class="mode-btn arena" id="arena-btn">🔥 Arena Mode 🔥</button>
            <button class="mode-btn live-match" id="live-match-btn">1v1 Online Live Match</button>
            <button class="mode-btn leaderboard" id="leaderboard-btn">Monthly Leaderboard (Top 100)</button>
        </div>
    </div>

    <div id="game-screen" class="container hidden">
        <div class="session-card">
            <div class="session-icon">➕</div>
            <h2>Addition Session</h2>
            <p class="session-subtitle">(Addition Challenge)</p>
            <p class="session-desc">Are you ready for the ultimate math combat? Keep your fingers ready!</p>
            
            <button id="start-game-btn" class="start-btn">START GAME</button>
        </div>
    </div>

    <audio id="bg-music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
    <audio id="click-sound" src="https://actions.google.com/sounds/v1/ui/click.ogg"></audio>

    <script>
        const dashboard = document.getElementById('dashboard');
        const gameScreen = document.getElementById('game-screen');

        const soloBadgesBtn = document.getElementById('solo-badges-btn');
        const mindTestBtn = document.getElementById('mind-test-btn');
        const arenaBtn = document.getElementById('arena-btn');
        const liveMatchBtn = document.getElementById('live-match-btn');
        const leaderboardBtn = document.getElementById('leaderboard-btn');
        const startGameBtn = document.getElementById('start-game-btn');

        const bgMusic = document.getElementById('bg-music');
        const clickSound = document.getElementById('click-sound');
        const volumeSlider = document.getElementById('volume-slider');

        // Play music on first interaction
        document.body.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play().catch(err => console.log("Music muted"));
                bgMusic.volume = volumeSlider.value / 100;
            }
        }, { once: true });

        // Volume control trigger
        volumeSlider.addEventListener('input', (e) => {
            bgMusic.volume = e.target.value / 100;
        });

        function playClick() {
            clickSound.currentTime = 0;
            clickSound.play();
        }

        // Solo Badges Action Logic
        soloBadgesBtn.addEventListener('click', () => {
            playClick();
            dashboard.classList.add('hidden');
            gameScreen.classList.remove('hidden');
        });

        // Other modes fallback alerts
        mindTestBtn.addEventListener('click', () => { playClick(); alert("Starting Mind Test..."); });
        arenaBtn.addEventListener('click', () => { playClick(); alert("Entering Arena..."); });
        liveMatchBtn.addEventListener('click', () => { playClick(); alert("Searching Match..."); });
        leaderboardBtn.addEventListener('click', () => { playClick(); alert("Loading Leaderboard..."); });

        // Start Game Action Logic
        startGameBtn.addEventListener('click', () => {
            playClick();
            alert("Game is starting now!");
        });
    </script>
</body>
</html>
