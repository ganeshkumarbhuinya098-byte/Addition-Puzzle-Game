<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Arena - Mini Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            background: #151922;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #232936;
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
        }

        .menu-corner {
            position: absolute;
            top: 15px;
            right: 15px;
        }

        .menu-btn {
            background: #232936;
            color: #45f3ff;
            border: 1px solid #45f3ff;
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .menu-btn:hover {
            background: #45f3ff;
            color: #0b0c10;
            box-shadow: 0 0 10px #45f3ff;
        }

        .game-header h1 {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .game-header span {
            color: #45f3ff;
        }

        .current-mode {
            color: #8b949e;
            font-size: 0.9rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .question-box {
            background: #0d1117;
            border: 1px solid #1f242c;
            border-radius: 8px;
            padding: 25px 15px;
            margin-bottom: 20px;
        }

        #display-question {
            font-size: 2.2rem;
            color: #fff;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .score-board {
            font-size: 0.95rem;
            color: #8b949e;
        }

        #score-val {
            color: #45f3ff;
            font-weight: bold;
        }

        .input-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #answer-input {
            width: 100%;
            padding: 12px;
            font-size: 1.2rem;
            background: #0d1117;
            border: 1px solid #232936;
            color: #fff;
            border-radius: 6px;
            text-align: center;
            outline: none;
        }

        #answer-input:focus {
            border-color: #45f3ff;
        }

        .submit-btn {
            background: #45f3ff;
            color: #0b0c10;
            border: none;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        .submit-btn:hover {
            background: #fff;
            box-shadow: 0 0 15px #45f3ff;
        }

        .feedback-message {
            font-size: 1rem;
            font-weight: bold;
            margin-top: 10px;
            min-height: 24px;
        }

        .correct {
            color: #2e7d32;
        }

        .wrong {
            color: #c62828;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal-box {
            background: #151922;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #232936;
            width: 85%;
            max-width: 320px;
            text-align: center;
        }

        .modal-box h3 {
            color: #fff;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .session-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .session-btn {
            background: #0d1117;
            color: #fff;
            border: 1px solid #232936;
            padding: 12px;
            font-size: 0.95rem;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }

        .session-btn:hover {
            border-color: #45f3ff;
            color: #45f3ff;
            background: #1f2833;
        }

        .close-btn {
            background: #991b1b;
            color: #fff;
            margin-top: 15px;
            border: none;
            padding: 8px;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="menu-corner">
            <button class="menu-btn" id="open-sessions-btn">Select Mode ⚙️</button>
        </div>

        <div class="game-header">
            <h1>MATH <span>ARENA</span></h1>
            <div class="current-mode" id="mode-text">Addition Mode</div>
        </div>

        <div class="question-box">
            <div id="display-question">0 + 0</div>
            <div class="score-board">Score: <span id="score-val">0</span></div>
            <div id="feedback" class="feedback-message"></div>
        </div>

        <div class="input-area">
            <input type="number" id="answer-input" placeholder="Enter your answer" pattern="[0-9]*" inputmode="numeric">
            <button class="submit-btn" id="submit-answer-btn">SUBMIT</button>
        </div>
    </div>

    <div class="modal-overlay hidden" id="sessions-modal">
        <div class="modal-box">
            <h3>Select Game Mode</h3>
            <div class="session-options">
                <button class="session-btn" data-mode="addition">Addition (+)</button>
                <button class="session-btn" data-mode="subtraction">Subtraction (-)</button>
                <button class="session-btn" data-mode="multiplication">Multiplication (×)</button>
                <button class="session-btn" data-mode="division">Division (÷)</button>
            </div>
            <button class="close-btn" id="close-modal-btn">Close</button>
        </div>
    </div>

    <audio id="click-sound" src="https://actions.google.com/sounds/v1/ui/click.ogg"></audio>

    <script>
        const openSessionsBtn = document.getElementById('open-sessions-btn');
        const sessionsModal = document.getElementById('sessions-modal');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const modeText = document.getElementById('mode-text');
        const displayQuestion = document.getElementById('display-question');
        const scoreVal = document.getElementById('score-val');
        const answerInput = document.getElementById('answer-input');
        const submitAnswerBtn = document.getElementById('submit-answer-btn');
        const feedback = document.getElementById('feedback');
        const clickSound = document.getElementById('click-sound');

        let currentMode = 'addition'; 
        let score = 0;
        let num1 = 0;
        let num2 = 0;
        let correctAnswer = 0;

        function playClick() {
            clickSound.currentTime = 0;
            clickSound.play().catch(e => console.log("Sound play error"));
        }

        openSessionsBtn.addEventListener('click', () => {
            playClick();
            sessionsModal.classList.remove('hidden');
        });

        closeModalBtn.addEventListener('click', () => {
            playClick();
            sessionsModal.classList.add('hidden');
        });

        document.querySelectorAll('.session-btn').forEach(button => {
            button.addEventListener('click', (e) => {
                playClick();
                currentMode = e.target.getAttribute('data-mode');
                modeText.innerText = currentMode.charAt(0).toUpperCase() + currentMode.slice(1) + " Mode";
                sessionsModal.classList.add('hidden'); 
                feedback.innerText = "";
                generateQuestion(); 
            });
        });

        function generateQuestion() {
            answerInput.value = ''; 
            answerInput.focus();

            num1 = Math.floor(Math.random() * 20) + 1;
            num2 = Math.floor(Math.random() * 10) + 1;

            if (currentMode === 'addition') {
                correctAnswer = num1 + num2;
                displayQuestion.innerText = num1 + " + " + num2;
            } else if (currentMode === 'subtraction') {
                if (num1 < num2) { 
                    let temp = num1; 
                    num1 = num2; 
                    num2 = temp; 
                }
                correctAnswer = num1 - num2;
                displayQuestion.innerText = num1 + " - " + num2;
            } else if (currentMode === 'multiplication') {
                num1 = Math.floor(Math.random() * 10) + 1;
                num2 = Math.floor(Math.random() * 10) + 1;
                correctAnswer = num1 * num2;
                displayQuestion.innerText = num1 + " × " + num2;
            } else if (currentMode === 'division') {
                num2 = Math.floor(Math.random() * 5) + 1;
                let answerTemp = Math.floor(Math.random() * 5) + 1;
                num1 = num2 * answerTemp;
                correctAnswer = num1 / num2;
                displayQuestion.innerText = num1 + " ÷ " + num2;
            }
        }

        function checkAnswer() {
            playClick();
            const playerAnswer = parseInt(answerInput.value);

            if (isNaN(playerAnswer)) {
                feedback.innerText = "Please enter a valid number!";
                feedback.className = "feedback-message wrong";
                return;
            }

            if (playerAnswer === correctAnswer) {
                score += 10;
                scoreVal.innerText = score;
                feedback.innerText = "Correct! +10 Points";
                feedback.className = "feedback-message correct";
                
                setTimeout(() => {
                    feedback.innerText = "";
                    generateQuestion();
                }, 1000);
            } else {
                feedback.innerText = "Wrong! Try Next One";
                feedback.className = "feedback-message wrong";
                
                setTimeout(() => {
                    feedback.innerText = "";
                    generateQuestion();
                }, 1200);
            }
        }

        submitAnswerBtn.addEventListener('click', checkAnswer);
        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        generateQuestion();
    </script>
</body>
</html>
