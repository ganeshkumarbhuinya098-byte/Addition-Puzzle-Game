<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DualMind-Arena</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bg-music" src="https://actions.google.com/sounds/v1/ambiences/morning_birds.ogg" loop></audio>
    <audio id="click-sound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg"></audio>

    <div id="disconnection-overlay" class="hidden">
        <h2>Connection Lost!</h2>
        <p>To prevent cheating, an active internet connection is required.</p>
        <p>If you were in a match, it may be counted as a loss.</p>
    </div>

    <div id="login-screen" class="game-card">
        <h1>DualMind-Arena</h1>
        <p>Enter your name to start the game:</p>
        <input type="text" id="username-input" placeholder="Player name..." maxlength="12">
        <button class="btn btn-main" onclick="initPlayer()">Enter Arena</button>
    </div>

    <div id="main-menu" class="game-card hidden">
        <h1 id="player-title">Player Dashboard</h1>
        
        <div class="stats-box">
            <div class="stats-item">Level: <span id="stat-level">1</span></div>
            <div class="stats-item">Total Points: <span id="stat-points">0</span></div>
            <div class="stats-item">Wins (1v1): <span id="stat-wins">0</span></div>
            <div class="stats-item">Streak 🔥: <span id="stat-streak">0</span></div>
        </div>

        <button class="btn btn-solo" onclick="selectMode('solo')">Solo Badges (+, -, ×, ÷)</button>
        <button class="btn btn-mixed" onclick="selectMode('mixed')">Mind Test (Mixed Mode)</button>
        <button class="btn btn-arena" onclick="selectMode('arena')">🔥 Arena Mode 🔥</button>
        <button class="btn btn-multi" onclick="selectMode('multiplayer')">1v1 Online Live Match</button>
        <button class="btn btn-leader" onclick="selectMode('leaderboard')">Monthly Leaderboard (Top 100)</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
