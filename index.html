<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Arena - Gaming Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="dashboard" class="container">
        <div class="settings-corner">
            <span class="vol-icon">🔊</span>
            <input type="range" id="volume-slider" min="0" max="100" value="50">
        </div>

        <div class="header">
            <h1>MATH <span>ARENA</span></h1>
            <p>Welcome, Player 1</p>
        </div>

        <div class="mode-selection">
            <button class="mode-btn solo" id="solo-badges-btn">
                <span class="btn-icon">🎖️</span> Solo Badges
            </button>
            <button class="mode-btn arena" id="enter-arena-btn">
                <span class="btn-icon">⚔️</span> Enter Arena
            </button>
        </div>
    </div>

    <div id="game-screen" class="container hidden">
        <div class="session-card">
            <div class="session-icon">➕</div>
            <h2>जोड़ वाला सेशन</h2>
            <p class="session-subtitle">(Addition Challenge)</p>
            <p class="session-desc">क्या आप गणित के इस महायुद्ध के लिए तैयार हैं? अपनी उंगलियां तैयार रखिए!</p>
            
            <button id="start-game-btn" class="start-btn">START GAME</button>
        </div>
    </div>

    <audio id="bg-music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
    <audio id="click-sound" src="https://actions.google.com/sounds/v1/ui/click.ogg"></audio>

</body>
</html>
