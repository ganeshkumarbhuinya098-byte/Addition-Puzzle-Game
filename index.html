<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Puzzle Arena Lite</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #FFF;
        }

        /* Main Game UI Container */
        .game-container {
            display: flex; 
            width: 100%;
            max-width: 400px;
            padding: 20px;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Stats Bar */
        .stats-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            background: #1E1E1E;
            padding: 15px;
            border-radius: 16px;
            border: 2px solid #333;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
            font-size: 14px;
        }

        /* Puzzle Box with Dotted Grid */
        .puzzle-box {
            width: 100%;
            background: #1E1E1E;
            border: 3px solid #333;
            border-radius: 24px;
            padding: 40px 20px;
            position: relative; 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            box-shadow: 0 10px 0 #000;
            background-image: radial-gradient(#444 1.5px, transparent 1.5px);
            background-size: 18px 18px;
        }

        /* Sound Control Button Positioned Top Right */
        .sound-control-container {
            position: absolute;
            top: 15px;
            right: 20px;
            z-index: 15;
        }

        #soundToggleBtn {
            background: #2D2D2D;
            border: 1px solid #444;
            color: #fff;
            padding: 6px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
            box-shadow: 0 3px 0 #000;
        }

        #soundToggleBtn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #000;
        }

        .current-mode-title {
            font-size: 14px;
            font-weight: bold;
            color: #AAA;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #2D2D2D;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .question {
            font-size: 46px;
            font-weight: 800;
            color: #FFF;
            letter-spacing: 2px;
        }

        .question span {
            color: #A855F7;
        }

        .input-box {
            width: 85%;
            height: 65px;
            border: 3px solid #333;
            border-radius: 16px;
            background: #121212;
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: #FFF;
            outline: none;
        }

        .submit-btn {
            width: 85%;
            height: 55px;
            background: #7C3AED;
            color: white;
            border: 2px solid #000;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 0 #000;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .submit-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #000;
        }

        /* Controls Style */
        .control-btns {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .action-btn {
            width: 100%;
            padding: 14px;
            border: 2px solid #333;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            background: #1E1E1E;
            color: #FFF;
            cursor: pointer;
            box-shadow: 0 4px 0 #000;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
        }

        .action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #000;
        }

        /* Feedback Overlay Styling */
        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 21px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10; display: none;
        }
        .feedback-overlay.correct { background: #06B6D4; color: white; animation: burst 0.3s forwards; }
        .feedback-overlay.wrong { background: #EF4444; color: white; animation: shake 0.3s ease-in-out; }
        .feedback-icon { font-size: 60px; margin-bottom: 10px; }
        .feedback-text { font-size: 24px; font-weight: 800; }

        /* Modals Menu UI */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; visibility: hidden; opacity: 0; transition: all 0.2s ease;
        }
        .modal.active { visibility: visible; opacity: 1; }

        .modal-content {
            background: #1E1E1E;
            border: 3px solid #333;
            border-radius: 24px;
            padding: 25px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 8px 0 #000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu-btn {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            border: 2px solid #333;
            border-radius: 12px;
            background: #121212;
            color: #FFF;
            cursor: pointer;
            text-align: left;
        }
        .menu-btn.active-mode { background: #7C3AED; border-color: #A855F7; }
        .divider { height: 2px; background: #333; margin: 4px 0; }

        @keyframes burst { 0% { transform: scale(0.7); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }
    </style>
</head>
<body>

    <div class="game-container" id="main-game-container">
        <div class="stats-bar">
            <div class="stat-item" style="color: #A855F7;">📈 LVL: <span id="level-val">1</span></div>
            <div class="stat-item" style="color: #06B6D4;">🏆 SCR: <span id="score-val">0</span></div>
            <div class="stat-item" style="color: #FBBF24;">⚡ STK: <span id="streak-val">0</span></div>
        </div>

        <div class="puzzle-box">
            <div class="sound-control-container">
                <button id="soundToggleBtn">🔊</button>
            </div>

            <div class="current-mode-title" id="mode-display-tag">Infinite Addition</div>
            <div class="question" id="question-text">0 <span>+</span> 0</div>
            <input type="number" class="input-box" id="answer-input" placeholder="?" inputmode="numeric">
            <button class="submit-btn" id="submit-btn">Submit</button>

            <div class="feedback-overlay" id="feedback-overlay">
                <div class="feedback-icon" id="feedback-icon">✓</div>
                <div class="feedback-text" id="feedback-text">Awesome!</div>
            </div>
        </div>

        <div class="control-btns">
            <button class="action-btn" id="switch-btn">⚙ Switch Mode Menu</button>
            <button class="action-btn" id="new-game-btn" style="background: #2D1A1A; border-color: #EF4444;">🔄 New Game</button>
        </div>
    </div>

    <div class="modal" id="mode-modal">
        <div class="modal-content">
            <h3 style="text-align:center; color:#FBBF24; margin-bottom:5px;">🎮 GAME MODES</h3>
            <div class="divider"></div>
            
            <button class="menu-btn active-mode" id="mode-add">➕ Infinite Addition</button>
            <button class="menu-btn" id="mode-sub">➖ Sub Penalty</button>
            <button class="menu-btn" id="mode-mul">✖ Multiply Master</button>
            <button class="menu-btn" id="mode-div">➗ Divide Arena</button>
            <button class="menu-btn" id="mode-mix">🔀 Mixed Arena (+, -, ×, ÷)</button>
            
            <div class="divider"></div>
            <button class="menu-btn" id="btn-close-mode" style="text-align:center; color:#AAA; background:#121212;">❌ Close</button>
        </div>
    </div>

    <script>
        let currentLevel = 1;
        let currentScore = 0;
        let currentStreak = 0;
        let gameMode = 'addition'; 
        let num1 = 0, num2 = 0, currentOperator = '+';

        // Audio Management Configuration
        let isSoundOn = true;
        const correctSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-84.wav'); 
        const wrongSound = new Audio('https://assets.mixkit.co/active_storage/sfx/911/911-84.wav');     
        const clickSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav');   

        const levelVal = document.getElementById('level-val');
        const scoreVal = document.getElementById('score-val');
        const streakVal = document.getElementById('streak-val');
        const questionText = document.getElementById('question-text');
        const answerInput = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const newGameBtn = document.getElementById('new-game-btn');
        const switchBtn = document.getElementById('switch-btn');
        const modeModal = document.getElementById('mode-modal');
        const modeDisplayTag = document.getElementById('mode-display-tag');
        const soundToggleBtn = document.getElementById('soundToggleBtn');
        
        const feedbackOverlay = document.getElementById('feedback-overlay');
        const feedbackIcon = document.getElementById('feedback-icon');
        const feedbackText = document.getElementById('feedback-text');

        window.onload = function() {
            resetGameBoard(); // Directly launch the board cleanly
        };

        // Master Audio Play Function
        function playSound(type) {
            if (!isSoundOn) return; 
            if (type === 'correct') { correctSound.currentTime = 0; correctSound.play().catch(e => {}); }
            else if (type === 'wrong') { wrongSound.currentTime = 0; wrongSound.play().catch(e => {}); }
            else if (type === 'click') { clickSound.currentTime = 0; clickSound.play().catch(e => {}); }
        }

        // Toggle Sound State Mute/Unmute
        soundToggleBtn.onclick = function() {
            isSoundOn = !isSoundOn;
            if (isSoundOn) {
                soundToggleBtn.innerText = "🔊";
                soundToggleBtn.style.borderColor = "#444";
            } else {
                soundToggleBtn.innerText = "🔇";
                soundToggleBtn.style.borderColor = "#EF4444";
            }
            playSound('click');
        };

        function resetGameBoard() {
            currentLevel = 1;
            currentScore = 0;
            currentStreak = 0;
            updateUI();
            generateQuestion();
        }

        function getRandom(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function generateQuestion() {
            if (gameMode === 'addition') currentOperator = '+';
            else if (gameMode === 'subtraction') currentOperator = '-';
            else if (gameMode === 'multiplication') currentOperator = '×';
            else if (gameMode === 'division') currentOperator = '➗';
            else {
                const ops = ['+', '-', '×', '➗'];
                currentOperator = ops[Math.floor(Math.random() * ops.length)];
            }

            if (currentOperator === '+' || currentOperator === '-') {
                if (currentLevel <= 2 && currentScore < 5) {
                    num1 = getRandom(5, 15);
                    num2 = getRandom(3, 12);
                } else if (currentLevel > 2 && currentScore < 5) {
                    num1 = getRandom(15, 30);
                    num2 = getRandom(10, 25);
                } else {
                    num1 = getRandom(35, 75);
                    num2 = getRandom(20, 50);
                }
                if (currentOperator === '-' && num1 < num2) {
                    let temp = num1; num1 = num2; num2 = temp;
                }
            } 
            else if (currentOperator === '×') {
                if (currentLevel <= 2 && currentScore < 5) {
                    num1 = getRandom(3, 9);
                    num2 = getRandom(2, 8);
                } else if (currentLevel > 2 && currentScore < 5) {
                    num1 = getRandom(7, 12);
                    num2 = getRandom(4, 9);
                } else {
                    num1 = getRandom(11, 19);
                    num2 = getRandom(3, 9);
                }
            } 
            else if (currentOperator === '➗') {
                let divisor, quotient;
                if (currentLevel <= 2 && currentScore < 5) {
                    divisor = getRandom(2, 6);
                    quotient = getRandom(2, 7);
                } else if (currentLevel > 2 && currentScore < 5) {
                    divisor = getRandom(4, 9);
                    quotient = getRandom(4, 9);
                } else {
                    divisor = getRandom(6, 12);
                    quotient = getRandom(6, 12);
                }
                num1 = divisor * quotient; 
                num2 = divisor;
            }

            questionText.innerHTML = `${num1} <span>${currentOperator}</span> ${num2}`;
            answerInput.value = '';
            answerInput.focus();
        }

        function checkAnswer() {
            const playerAns = parseInt(answerInput.value);
            if (isNaN(playerAns)) return;

            let correctAns;
            if (currentOperator === '+') correctAns = num1 + num2;
            else if (currentOperator === '-') correctAns = num1 - num2;
            else if (currentOperator === '×') correctAns = num1 * num2;
            else if (currentOperator === '➗') correctAns = num1 / num2;

            if (playerAns === correctAns) {
                currentScore += 1;
                currentStreak += 1;
                if (currentScore % 2 === 0) {
                    currentLevel += 1;
                }
                playSound('correct'); 
                showFeedback(true);
            } else {
                currentStreak = 0; 
                playSound('wrong'); 
                showFeedback(false);
            }
            updateUI();
        }

        function updateUI() {
            levelVal.innerText = currentLevel;
            scoreVal.innerText = currentScore;
            streakVal.innerText = currentStreak;
        }

        function showFeedback(isCorrect) {
            feedbackOverlay.className = 'feedback-overlay ' + (isCorrect ? 'correct' : 'wrong');
            feedbackIcon.innerText = isCorrect ? '✓' : '✗';
            feedbackText.innerText = isCorrect ? 'Awesome!' : 'Wrong! Try Again';
            feedbackOverlay.style.display = 'flex';

            setTimeout(() => {
                feedbackOverlay.style.display = 'none';
                if(isCorrect) generateQuestion(); 
                else { answerInput.value = ''; answerInput.focus(); }
            }, 900);
        }

        function selectMode(mode) {
            playSound('click');
            gameMode = mode;
            setActiveModeVisual(mode);
            generateQuestion();
            modeModal.classList.remove('active');
        }

        function setActiveModeVisual(mode) {
            const modeIds = { 'addition': 'mode-add', 'subtraction': 'mode-sub', 'multiplication': 'mode-mul', 'division': 'mode-div', 'mixed': 'mode-mix' };
            document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active-mode'));
            const activeBtn = document.getElementById(modeIds[mode]);
            if(activeBtn) {
                activeBtn.classList.add('active-mode');
                modeDisplayTag.innerText = activeBtn.innerText.replace(/^[^\s]+\s*/, '');
            }
        }

        submitBtn.onclick = checkAnswer;
        answerInput.onkeydown = (e) => { if (e.key === 'Enter') checkAnswer(); };
        
        switchBtn.onclick = () => { playSound('click'); modeModal.classList.add('active'); };
        document.getElementById('btn-close-mode').onclick = () => { playSound('click'); modeModal.classList.remove('active'); };
        newGameBtn.onclick = () => { playSound('click'); resetGameBoard(); };

        document.getElementById('mode-add').onclick = () => selectMode('addition');
        document.getElementById('mode-sub').onclick = () => selectMode('subtraction');
        document.getElementById('mode-mul').onclick = () => selectMode('multiplication');
        document.getElementById('mode-div').onclick = () => selectMode('division');
        document.getElementById('mode-mix').onclick = () => selectMode('mixed');
    </script>
</body>
</html>
