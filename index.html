<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Addition Puzzle</title>
<style>
body {
  margin:0;
  font-family: Arial;
  background:#6a0dad;
  color:white;
  text-align:center;
}
#game, #gameOver {
  padding-top:50px;
}
button {
  padding:15px;
  margin:10px;
  font-size:20px;
  border:none;
  border-radius:10px;
}
.option {
  background:white;
  color:black;
  width:120px;
}
#gameOver {
  display:none;
  background:red;
  height:100vh;
}
</style>
</head>

<body>

<div id="game">
  <h1>Addition Puzzle</h1>
  <h2 id="level">Level: 1</h2>
  <h2 id="question"></h2>

  <div>
    <button class="option" onclick="check(this)"></button>
    <button class="option" onclick="check(this)"></button>
    <button class="option" onclick="check(this)"></button>
    <button class="option" onclick="check(this)"></button>
  </div>
</div>

<div id="gameOver">
  <h1>Wrong Answer ❌</h1>
  <button onclick="restart()">Restart</button>
</div>

<script>
let level = 1;
let correct = 0;

function newQuestion() {
  let a = Math.floor(Math.random() * level) + 1;
  let b = Math.floor(Math.random() * level) + 1;
  correct = a + b;

  document.getElementById("question").innerText = a + " + " + b + " = ?";
  document.getElementById("level").innerText = "Level: " + level;

  let options = document.getElementsByClassName("option");
  let correctIndex = Math.floor(Math.random() * 4);

  for (let i = 0; i < 4; i++) {
    if (i == correctIndex) {
      options[i].innerText = correct;
    } else {
      options[i].innerText = correct + Math.floor(Math.random()*10) - 5;
    }
  }
}

function check(btn) {
  if (parseInt(btn.innerText) === correct) {
    level++;
    newQuestion();
  } else {
    document.getElementById("game").style.display = "none";
    document.getElementById("gameOver").style.display = "block";
  }
}

function restart() {
  level = 1;
  document.getElementById("game").style.display = "block";
  document.getElementById("gameOver").style.display = "none";
  newQuestion();
}

newQuestion();
</script>

</body>
</html>
